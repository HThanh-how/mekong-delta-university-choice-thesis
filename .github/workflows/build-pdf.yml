name: Build thesis PDF

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile with XeLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -halt-on-error -file-line-error
      - name: Prepare artifact
        run: |
          mkdir -p output/pdf
          cp main.pdf output/pdf/luan-van-chon-truong-nganh-dbscl.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: luan-van-pdf
          path: output/pdf/luan-van-chon-truong-nganh-dbscl.pdf
          if-no-files-found: error

