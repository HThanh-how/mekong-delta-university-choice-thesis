name: Build thesis PDF

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile with XeLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -halt-on-error -file-line-error
      - name: Prepare artifact
        run: |
          mkdir -p output/pdf
          cp main.pdf output/pdf/luan-van-chon-truong-nganh-dbscl.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: luan-van-pdf
          path: output/pdf/luan-van-chon-truong-nganh-dbscl.pdf
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download compiled PDF
        uses: actions/download-artifact@v4
        with:
          name: luan-van-pdf
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Mekong Delta University Choice Thesis - Build ${{ github.run_number }}
          body: |
            Automated PDF build of the thesis.

            Author: Pham Duy Tan (B2407059)
            Can Tho University - College of Engineering
          generate_release_notes: true
          files: dist/luan-van-chon-truong-nganh-dbscl.pdf
